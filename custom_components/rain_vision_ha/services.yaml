start_manual_irrigation:
  name: Start manual irrigation
  description: Start a manual irrigation run. Durations are seconds; zero skips a zone.
  target:
    device:
      integration: rain_vision_ha
  fields:
    zone_1:
      name: Zone 1
      description: Zone 1 duration in seconds.
      required: true
      selector:
        number:
          min: 0
          max: 28800
          unit_of_measurement: s
          mode: box
    zone_2:
      name: Zone 2
      description: Zone 2 duration in seconds.
      required: true
      selector:
        number:
          min: 0
          max: 28800
          unit_of_measurement: s
          mode: box
    zone_3:
      name: Zone 3
      description: Zone 3 duration in seconds.
      required: true
      selector:
        number:
          min: 0
          max: 28800
          unit_of_measurement: s
          mode: box
    zone_4:
      name: Zone 4
      description: Zone 4 duration in seconds.
      required: true
      selector:
        number:
          min: 0
          max: 28800
          unit_of_measurement: s
          mode: box
    zone_5:
      name: Zone 5
      description: Zone 5 duration in seconds.
      required: true
      selector:
        number:
          min: 0
          max: 28800
          unit_of_measurement: s
          mode: box
    zone_6:
      name: Zone 6
      description: Zone 6 duration in seconds.
      required: true
      selector:
        number:
          min: 0
          max: 28800
          unit_of_measurement: s
          mode: box

stop_irrigation:
  name: Stop irrigation
  description: Stop manual irrigation and return the controller to normal mode.
  target:
    device:
      integration: rain_vision_ha
